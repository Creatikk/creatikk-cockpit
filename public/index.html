<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Cockpit Creatikk</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#05060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{--bg:#05060f;--bg2:#080b1c;--card:#0d1230;--line:#1e2444;--line2:#2a3157;
    --ink:#eef0fb;--muted:#9aa0c4;--faint:#646a92;--cyan:#00bbf7;--purple:#9b5cff;
    --grad:linear-gradient(90deg,#00bbf7,#9b5cff);--good:#25d0a5;--warn:#f6b53d;--crit:#ff5c7a;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 600px at 12% -10%,rgba(0,187,247,.10),transparent 60%),
      radial-gradient(1000px 500px at 100% 0,rgba(155,92,255,.10),transparent 55%),var(--bg);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    padding:max(18px,env(safe-area-inset-top)) 15px 60px;line-height:1.45}
  .wrap{max-width:1040px;margin:0 auto}
  .tnum{font-variant-numeric:tabular-nums}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px rgba(37,208,165,.16);animation:pulse 2.4s infinite}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(37,208,165,0)}}
  @media(prefers-reduced-motion){.dot{animation:none}}
  h1{font-size:19px;font-weight:800;letter-spacing:-.3px}h1 span{color:var(--cyan)}
  .fresh{font-size:11.5px;color:var(--faint)}
  /* toggle fenêtre */
  .segrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:18px 0 4px}
  .seg{display:inline-flex;background:#0a0e24;border:1px solid var(--line);border-radius:11px;padding:3px}
  .daypick{background:#0a0e24;border:1px solid var(--line);border-radius:10px;color:var(--ink);font:inherit;font-size:13px;font-weight:600;padding:8px 11px;color-scheme:dark}
  .daypick.on{border-color:var(--cyan);color:var(--cyan)}
  .clear{background:none;border:1px solid var(--line);border-radius:10px;color:var(--muted);font:inherit;font-size:13px;font-weight:700;padding:8px 12px;cursor:pointer}
  .seg button{background:none;border:0;color:var(--muted);font:inherit;font-size:13px;font-weight:700;
    padding:7px 15px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--grad);color:#06121e}
  .win{font-size:12px;color:var(--faint);margin:8px 2px 14px}
  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:14px 15px;position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--grad);opacity:.65}
  .kpi.hero{grid-column:span 1}
  .kpi .lab{font-size:11px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:25px;font-weight:800;letter-spacing:-.5px;margin-top:7px;line-height:1}
  .kpi .val small{font-size:13px;color:var(--faint);font-weight:700}
  .kpi .note{font-size:11px;margin-top:6px;color:var(--faint)}
  .kpi.crit .val{color:var(--crit)}.kpi.good .val{color:var(--good)}
  .eye{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);margin:26px 0 12px;display:flex;align-items:center;gap:9px}
  .eye::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
  /* état live */
  .live{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
  @media(max-width:900px){.live{grid-template-columns:repeat(2,1fr)}}
  .st{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
  .st .l{font-size:11px;color:var(--muted);font-weight:600}
  .st .v{font-size:22px;font-weight:800;margin-top:5px;letter-spacing:-.4px}
  .st .s{font-size:11px;color:var(--faint);margin-top:3px}
  /* sparkline */
  .panel{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:15px;padding:16px 17px;margin-top:12px}
  .panel h3{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between}
  .panel h3 em{font-style:normal;color:var(--faint);font-size:11.5px;font-weight:600}
  .bars{display:flex;align-items:flex-end;gap:3px;height:90px}
  .bars .b{flex:1;background:var(--grad);opacity:.85;border-radius:3px 3px 1px 1px;min-height:2px}
  /* carte ventes cliquable + détail */
  .kpi.click{cursor:pointer;transition:border-color .15s,transform .05s}
  .kpi.click:hover{border-color:var(--muted)}
  .kpi.click:active{transform:scale(.995)}
  .kpi .hint{position:absolute;top:10px;right:11px;font-size:10px;color:var(--faint)}
  .txlist{display:flex;flex-direction:column;gap:1px;max-height:420px;overflow-y:auto}
  .txrow{display:grid;grid-template-columns:78px 1.5fr 1fr auto 96px;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line);font-size:12.5px}
  .txrow:last-child{border-bottom:none}
  .txbadge{font-size:10px;font-weight:700;text-align:center;padding:3px 0;border-radius:6px}
  .txbadge.new{background:rgba(0,187,247,.14);color:#59d3ff}
  .txbadge.renew{background:rgba(155,92,255,.14);color:#c3a3ff}
  .txmail{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .txplan{color:var(--faint);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .txamt{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
  .txtime{color:var(--faint);font-size:11px;text-align:right}
  @media(max-width:700px){.txrow{grid-template-columns:64px 1fr 72px}.txplan,.txtime{display:none}}
  /* cohortes */
  .cohort{font-size:12px}
  .chead,.crow{display:grid;grid-template-columns:60px 38px repeat(7,1fr);gap:4px;align-items:center}
  .chead{color:var(--muted);font-weight:600;font-size:10.5px;margin-bottom:7px}
  .chead span,.crow span{text-align:center}
  .crow{margin-bottom:4px}
  .cm{color:var(--muted);text-align:left!important;font-weight:600}
  .cn{color:var(--faint)}
  .cc{padding:6px 0;border-radius:5px;font-variant-numeric:tabular-nums;font-size:11px}
  .cc.empty{background:transparent;color:transparent}
  @media(max-width:760px){.cohort{overflow-x:auto}.chead,.crow{min-width:440px}}
  .alert{display:flex;align-items:center;gap:10px;background:rgba(255,92,122,.08);border:1px solid rgba(255,92,122,.3);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px;color:#ffd3dc}
  .alert.warn{background:rgba(246,181,61,.08);border-color:rgba(246,181,61,.3);color:#ffe6b8}
  .foot{margin-top:26px;text-align:center;color:var(--faint);font-size:11px;line-height:1.7}
  .load{text-align:center;color:var(--faint);padding:40px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="dot"></span><h1>Cockpit <span>Creatikk</span></h1></div>
    <div class="fresh" id="fresh">chargement…</div>
  </div>

  <div id="app"><div class="load">⏳ Connexion à Stripe…<br><span style="font-size:12px">(le 1er chargement prend ~30 s)</span></div></div>

  <div class="foot">
    Données Stripe en direct · rafraîchies toutes les 3 min.<br>
    <span id="alerts-note"></span>
  </div>
</div>

<script>
const F = new Intl.NumberFormat('fr-FR');
const F2 = new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
let win = 'today';
let showTx = false; // détail des ventes ouvert ?
const WINLABEL = { today: "aujourd'hui", d7: '7 derniers jours', d30: '30 derniers jours' };
const MOIS = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const isDay = (k) => /^\d{4}-\d{2}-\d{2}$/.test(k);
function winLabel(k){ if (WINLABEL[k]) return WINLABEL[k]; const [y,m,dd]=k.split('-'); return `${+dd} ${MOIS[+m-1]} ${y}`; }

function money(n){ return F2.format(+n||0) + ' €'; }
function txTime(t){ const dt=new Date(t*1000); const h=String(dt.getHours()).padStart(2,'0'), mi=String(dt.getMinutes()).padStart(2,'0'); return `${dt.getDate()} ${MOIS[dt.getMonth()]} · ${h}:${mi}`; }
// transactions de la fenêtre courante
function txForWin(d){
  const tx = d.tx || [];
  if (isDay(win)) return tx.filter(x => x.d === win);
  if (win === 'today') return tx.filter(x => x.d === d.maxDay);
  const from = (d.nowSec || 0) - (win === 'd7' ? 7 : 30) * 86400;
  return tx.filter(x => x.t >= from);
}
// flèche de tendance ; goodUp=false quand « moins = mieux » (ex résiliations)
function arrow(delta, goodUp){
  if (goodUp === undefined) goodUp = true;
  if (!delta) return `<span style="color:var(--faint)">→ 0%</span>`;
  const up = delta > 0, good = (up === goodUp);
  return `<span style="color:${good?'var(--good)':'var(--crit)'}">${up?'▲':'▼'} ${up?'+':''}${delta}%</span>`;
}
function cohColor(v){ return `rgba(46,213,146,${Math.max(.06, Math.min(.85, v/100)).toFixed(2)})`; } // vert = rétention

function render(d){
  const dayMode = isDay(win);
  const w = (dayMode ? (d.days && d.days[win]) : d[win]) || {rev:0,sales:0,news:0,cancels:0,fails:0,failRate:0,refund:0,net:0,newSales:0,renews:0,disputes:0,disputeAmt:0};
  const L = d.live;
  const app = document.getElementById('app');
  // alertes
  let alerts = '';
  if (L.canceling > 0) alerts += `<div class="alert">⚠️ <b>${L.canceling} abonnés</b> ont déjà cliqué « annuler » — soit <b>${money(d.mrrLost)}/mois</b> qui partent. Relance-les.</div>`;
  if (win==='today' && d.today.cancels > d.today.news && (d.today.cancels||d.today.news)) alerts += `<div class="alert warn">📉 Aujourd'hui tu perds plus (−${d.today.cancels}) que tu ne gagnes (+${d.today.news}).</div>`;

  // trafic (PostHog)
  let trafficHtml = '';
  const t = dayMode ? (d.trafficDays ? d.trafficDays[win] : null) : (d.traffic ? d.traffic[win] : null);
  if (t){
    const rate = t.tunnelStart ? Math.min(100, Math.round(t.reachedProduct/t.tunnelStart*100)) : null;
    trafficHtml = `
    <div class="eye">Trafic &amp; tunnel · ${winLabel(win)}</div>
    <div class="live">
      <div class="st"><div class="l">🌐 Visites</div><div class="v tnum">${F.format(t.visits)}</div><div class="s">${F.format(t.visitors)} visiteur${t.visitors>1?'s':''}</div></div>
      <div class="st"><div class="l">🚪 Entrées tunnel</div><div class="v tnum">${F.format(t.tunnelStart)}</div><div class="s">début du parcours</div></div>
      <div class="st"><div class="l">✅ Arrivés au produit</div><div class="v tnum">${F.format(t.reachedProduct)}</div><div class="s">${rate!==null?rate+'% du tunnel':'—'}</div></div>
      <div class="st"><div class="l">🎬 1res vidéos</div><div class="v tnum">${F.format(t.firstVideo)}</div><div class="s">activation</div></div>
    </div>
    <div style="font-size:11px;color:var(--faint);margin-top:8px">PostHog · quasi vide avant le lancement (navigation de test) — se remplira tout seul.</div>`;
  }
  const maxS = Math.max(1, ...d.spark.map(s=>s.v));
  const bars = d.spark.map(s=>`<div class="b" style="height:${Math.max(2,Math.round(s.v/maxS*100))}%" title="${s.d}: ${money(s.v)}"></div>`).join('');

  app.innerHTML = `
    <div class="segrow">
      <div class="seg">
        <button data-w="today" class="${win==='today'?'on':''}">Aujourd'hui</button>
        <button data-w="d7" class="${win==='d7'?'on':''}">7 jours</button>
        <button data-w="d30" class="${win==='d30'?'on':''}">30 jours</button>
      </div>
      <input type="date" id="daypick" class="daypick ${dayMode?'on':''}" min="${d.minDay||''}" max="${d.maxDay||''}" value="${dayMode?win:''}">
      ${dayMode?`<button class="clear" id="clearday">✕</button>`:''}
    </div>
    <div class="win">Fenêtre : <b style="color:var(--muted)">${winLabel(win)}</b>${dayMode?' · un seul jour':''}</div>

    <div class="kpis">
      <div class="kpi good click" id="salescard"><div class="hint">${showTx?'▲ fermer':'▼ détail'}</div><div class="lab">💶 Ventes</div><div class="val tnum">${money(w.rev)}</div><div class="note">${w.newSales} nouvelle${w.newSales>1?'s':''} · ${w.renews} renouv.</div></div>
      <div class="kpi"><div class="lab">🆕 Nouveaux abonnés</div><div class="val tnum">+${w.news}</div><div class="note">${winLabel(win)}</div></div>
      <div class="kpi ${w.cancels>w.news?'crit':''}"><div class="lab">📉 Résiliations</div><div class="val tnum">−${w.cancels}</div><div class="note">${winLabel(win)}</div></div>
      <div class="kpi"><div class="lab">🔄 Net</div><div class="val tnum">${(w.news-w.cancels)>=0?'+':''}${w.news-w.cancels}</div><div class="note">nouveaux − partis</div></div>
      <div class="kpi ${w.fails>0?'crit':''}"><div class="lab">❌ Paiements échoués</div><div class="val tnum">${w.fails}</div><div class="note">${winLabel(win)}</div></div>
    </div>

    ${showTx?(()=>{const list=txForWin(d);const sum=list.reduce((a,x)=>a+x.amt,0);return `
    <div class="panel">
      <h3>🧾 Détail des ventes · ${winLabel(win)} <em>${list.length} paiement${list.length>1?'s':''} · ${money(sum)}</em></h3>
      ${list.length?`<div class="txlist">${list.map(x=>`<div class="txrow">
        <span class="txbadge ${x.type}">${x.type==='new'?'Nouvelle':'Renouv'}</span>
        <span class="txmail" title="${x.email}">${x.email||'—'}</span>
        <span class="txplan">${x.plan}</span>
        <span class="txamt">${money(x.amt)}</span>
        <span class="txtime">${txTime(x.t)}</span>
      </div>`).join('')}</div>`:'<div style="color:var(--faint);font-size:12px;padding:6px">Aucun paiement sur cette fenêtre.</div>'}
    </div>`;})():''}

    ${alerts}

    ${d.supaConnected?`
    <div class="eye">🧭 Funnel · inscription → paiement · ${winLabel(win)}</div>
    <div class="live">
      <div class="st"><div class="l">🧑 Comptes créés</div><div class="v tnum">${F.format(w.signups||0)}</div><div class="s">Supabase (vrai)</div></div>
      <div class="st"><div class="l">💳 Nouvelles ventes</div><div class="v tnum">${F.format(w.newSales||0)}</div><div class="s">1er paiement</div></div>
      <div class="st"><div class="l">🎯 Conversion</div><div class="v tnum" style="color:${w.signups&&(w.newSales/w.signups)>=0.05?'var(--good)':'var(--ink)'}">${w.signups?(w.newSales/w.signups*100).toFixed(1):'0'}%</div><div class="s">inscrit → payé</div></div>
      <div class="st"><div class="l">💤 Non convertis</div><div class="v tnum">${F.format(Math.max(0,(w.signups||0)-(w.newSales||0)))}</div><div class="s">à activer / relancer</div></div>
    </div>
    <div style="font-size:11px;color:var(--faint);margin-top:8px">Vraies créations de compte (Supabase Auth) vs 1ers paiements (Stripe) sur la fenêtre. Le taux inscrit→payé = ton levier n°1.</div>
    `:''}

    <div class="eye">💰 Recettes · Coûts · Marge · ${winLabel(win)}</div>
    <div class="live">
      <div class="st"><div class="l">💶 Recettes</div><div class="v tnum">${money(w.rev)}</div><div class="s">${w.newSales} nouv · ${w.renews} renouv</div></div>
      <div class="st"><div class="l">🏦 Frais Stripe</div><div class="v tnum">−${money(w.stripeFee||0)}</div><div class="s">commissions paiement</div></div>
      <div class="st"><div class="l">🤖 Coûts IA</div><div class="v tnum">−${money((w.aiClaude||0)+(w.aiFal||0)+(w.aiOpenai||0))}</div><div class="s">🧠 ${money(w.aiClaude||0)} · 🎬 ${money(w.aiFal||0)} · ⚡ ${money(w.aiOpenai||0)}</div></div>
      <div class="st"><div class="l">🏠 Coûts fixes</div><div class="v tnum">−${money(w.fixedCost||0)}</div><div class="s">${d.monthlyTotal?money(d.monthlyTotal)+'/mois':'à configurer'}</div></div>
      <div class="st"><div class="l">📊 Marge</div><div class="v tnum" style="color:${(w.margin||0)>=0?'var(--good)':'var(--crit)'}">${money(w.margin||0)}</div><div class="s">${w.rev?Math.round((w.margin||0)/w.rev*100):0}% des recettes</div></div>
    </div>
    <div style="font-size:11px;color:var(--faint);margin-top:8px">Marge = recettes − frais Stripe − remb − litiges − coûts IA (Claude+fal+OpenAI, usage réel/jour) − coûts fixes (répartis /jour). ${Object.keys(d.monthlyCosts||{}).length?('Fixes : '+Object.entries(d.monthlyCosts).map(([k,v])=>k+' '+v+'€').join(' · ')+'/mois'):'⚠️ Coûts fixes non configurés (variable MONTHLY_COSTS).'}</div>

    <div class="eye">État actuel · en temps réel</div>
    <div class="live">
      <div class="st"><div class="l">📈 MRR</div><div class="v tnum">${money(L.mrr)}</div><div class="s">ARR ${money(L.arr)}</div></div>
      <div class="st"><div class="l">🔄 Abonnés actifs</div><div class="v tnum">${F.format(L.active)}</div><div class="s">ARPU ${L.arpu} €</div></div>
      <div class="st"><div class="l">⚠️ En résiliation</div><div class="v tnum" style="color:var(--warn)">${L.canceling}</div><div class="s">${money(d.mrrLost)}/m qui partent</div></div>
      <div class="st"><div class="l">⏳ Retard paiement</div><div class="v tnum">${L.pastDue}</div><div class="s">à relancer (dunning)</div></div>
    </div>

    ${d.trends?(()=>{const T=d.trends;return `
    <div class="eye">📈 Tendance · 7 jours vs 7 précédents</div>
    <div class="live">
      <div class="st"><div class="l">💶 Recettes</div><div class="v tnum">${money(T.rev.cur)}</div><div class="s">${arrow(T.rev.delta)} · avant ${money(T.rev.prev)}</div></div>
      <div class="st"><div class="l">🧑 Inscriptions</div><div class="v tnum">${F.format(T.signups.cur)}</div><div class="s">${arrow(T.signups.delta)} · avant ${F.format(T.signups.prev)}</div></div>
      <div class="st"><div class="l">🎯 Conversion</div><div class="v tnum">${T.conv.cur}%</div><div class="s">${arrow(T.conv.delta)} · avant ${T.conv.prev}%</div></div>
      <div class="st"><div class="l">📉 Résiliations</div><div class="v tnum">${T.cancels.cur}</div><div class="s">${arrow(T.cancels.delta,false)} · avant ${T.cancels.prev}</div></div>
    </div>`;})():''}

    ${d.planMix&&d.planMix.length?`
    <div class="eye">🧩 Répartition par formule · abonnés actifs</div>
    <div class="live">
      ${d.planMix.slice(0,8).map(p=>`<div class="st"><div class="l">${p.label}</div><div class="v tnum">${F.format(p.count)}</div><div class="s">MRR ${money(p.mrr)}</div></div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--faint);margin-top:8px">Où se concentre ton MRR. L'annuel = revenu sécurisé (la « bouée » anti-churn).</div>`:''}

    <div class="eye">Santé &amp; risques · ${winLabel(win)}</div>
    <div class="live">
      <div class="st"><div class="l">💚 Revenu net</div><div class="v tnum">${money(w.net)}</div><div class="s">après remb. &amp; litiges</div></div>
      <div class="st"><div class="l">❌ Taux d'échec paiement</div><div class="v tnum" style="color:${w.failRate>40?'var(--crit)':'var(--ink)'}">${w.failRate}%</div><div class="s">${w.fails} échec${w.fails>1?'s':''}</div></div>
      <div class="st"><div class="l">↩️ Remboursements</div><div class="v tnum">${money(w.refund)}</div><div class="s">${winLabel(win)}</div></div>
      <div class="st"><div class="l">⚖️ Litiges (chargebacks)</div><div class="v tnum" style="color:${w.disputes>0?'var(--warn)':'var(--ink)'}">${w.disputes}</div><div class="s">${money(w.disputeAmt)} contestés</div></div>
    </div>

    ${trafficHtml}

    <div class="eye">Acquisition créateurs · Whop</div>
    <div class="live">
      <div class="st" style="opacity:.55"><div class="l">🎬 Vues générées</div><div class="v tnum">—</div><div class="s">dès la v2</div></div>
      <div class="st" style="opacity:.55"><div class="l">💸 Coût / 1000 vues</div><div class="v tnum">1 $</div><div class="s">payé aux vues</div></div>
      <div class="st" style="opacity:.55"><div class="l">🎯 Coût par inscrit</div><div class="v tnum">—</div><div class="s">vues → inscrits</div></div>
      <div class="st" style="opacity:.55"><div class="l">💰 Coût par vente</div><div class="v tnum">—</div><div class="s">ton vrai CAC</div></div>
    </div>
    <div style="font-size:11px;color:var(--faint);margin-top:8px">Se branchera quand tes créateurs démarreront (sortie v2).</div>

    ${d.cohorts&&d.cohorts.length?`
    <div class="panel">
      <h3>🔁 Rétention par cohorte · abonnés mensuels <em>% encore abonné après N mois</em></h3>
      <div class="cohort">
        <div class="chead"><span style="text-align:left">Cohorte</span><span>n</span>${[0,1,2,3,4,5,6].map(k=>`<span>M${k}</span>`).join('')}</div>
        ${d.cohorts.slice().reverse().map(c=>`<div class="crow"><span class="cm">${c.month}</span><span class="cn">${F.format(c.size)}</span>${[0,1,2,3,4,5,6].map(k=>{const v=c.ret[k];return v===undefined?'<span class="cc empty">·</span>':`<span class="cc" style="background:${cohColor(v)}">${v}%</span>`;}).join('')}</div>`).join('')}
      </div>
      <div style="font-size:11px;color:var(--faint);margin-top:11px">Lecture : « 2026-01 · M1 = 40% » → sur les inscrits mensuels de janvier, 40% payaient encore 1 mois après. <b style="color:var(--muted)">Cible v2 : garder M1 &gt; 60-70%</b> (V1 tourne autour de 30-40%).</div>
    </div>`:''}

    <div class="panel">
      <h3>Revenu · 30 derniers jours <em>${money(d.d30.rev)} au total</em></h3>
      <div class="bars">${bars}</div>
    </div>
  `;
  document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{win=b.dataset.w;render(window._d);});
  const sc=document.getElementById('salescard'); if(sc) sc.onclick=()=>{ showTx=!showTx; render(window._d); };
  const dp=document.getElementById('daypick'); if(dp) dp.onchange=()=>{ if(dp.value){ win=dp.value; render(window._d); } };
  const cd=document.getElementById('clearday'); if(cd) cd.onclick=()=>{ win='today'; render(window._d); };
}

async function load(){
  try{
    const r = await fetch('api/data',{cache:'no-store'});
    const j = await r.json();
    const fresh = document.getElementById('fresh');
    if (j.loading){ fresh.textContent='Stripe se charge…'; setTimeout(load,4000); return; }
    if (j.error && !j.data){ document.getElementById('app').innerHTML=`<div class="load">⚠️ ${j.hasKey?'Erreur Stripe : '+j.error:'Clé Stripe manquante côté serveur.'}</div>`; return; }
    if (!j.data){ setTimeout(load,4000); return; }
    window._d = j.data;
    render(j.data);
    const mins = Math.round(j.ageMs/60000);
    fresh.textContent = 'à jour · il y a ' + (mins<1?'<1':mins) + ' min';
  }catch(e){ document.getElementById('fresh').textContent='hors ligne'; }
}
load();
setInterval(load, 60000); // rafraîchit l'affichage chaque minute
</script>
</body>
</html>
